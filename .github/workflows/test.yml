name: Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      node-modules-cache-hit: ${{ steps.cache-node-modules.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

  test-apps-ui:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm i

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run unit tests with coverage
        run: npm run -w apps/ui coverage

      - name: Run Storybook interaction tests
        run: npm run -w apps/ui test:storybook

      - name: Report coverage to PR
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: ./apps/ui

  test-packages:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [pathfinding, vectors]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm i

      - name: Run unit tests with coverage
        run: npm run -w packages/${{ matrix.package }} coverage

      - name: Report coverage to PR
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: "packages/${{ matrix.package }}"
          working-directory: ./packages/${{ matrix.package }}
